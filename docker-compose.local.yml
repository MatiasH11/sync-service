version: '3.8'

services:
    postgres:
        build:
            context: .
            dockerfile: Dockerfile.postgres
        environment:
            POSTGRES_DB: analytics
            POSTGRES_USER: dagster
            POSTGRES_PASSWORD: dagster_local
        ports:
            - '5433:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U dagster -d analytics']
            interval: 5s
            timeout: 3s
            retries: 5

    redis:
        image: redis:7-alpine
        command: redis-server --requirepass redis_local
        ports:
            - '6380:6379'

    dagster:
        build:
            context: .
            dockerfile: Dockerfile
        command: dagster dev -h 0.0.0.0 -p 3000
        ports:
            - '3000:3000'
        volumes:
            - .:/app
            - dagster_home:/app/.dagster
            - ./dagster.yaml:/app/.dagster/dagster.yaml
        env_file:
            - .env.local
        environment:
            DAGSTER_HOME: /app/.dagster
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started

volumes:
    postgres_data:
    dagster_home:
