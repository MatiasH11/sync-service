sync_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('WAREHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('WAREHOUSE_PORT', '5432') | int }}"
      dbname: "{{ env_var('WAREHOUSE_DATABASE', 'analytics') }}"
      user: "{{ env_var('WAREHOUSE_USER', 'dagster') }}"
      password: "{{ env_var('WAREHOUSE_PASSWORD', 'dagster_local') }}"
      schema: staging
      threads: 4
